# cosmoguard Helm values. See helm/cosmoguard/README.md for the
# full guide.

image:
  repository: ghcr.io/voluzi/cosmoguard
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Workload kind. Two options:
#   Deployment   — default, ephemeral pod identities. Cache and rate-limit
#                  data still survives a single-pod restart via olric DMap
#                  replication.
#   StatefulSet  — recommended when running in cluster mode. Stable pod
#                  hostnames (cosmoguard-0 is always cosmoguard-0). No PVCs
#                  are templated — cosmoguard is in-memory only by design;
#                  replication via olric is the durability mechanism, not
#                  disk.
#
# Note: per-pod observability snapshots (dashboard panels keyed by pod_id)
# only survive pod replacement when ALL of these hold: cluster mode is on
# (config.cache.cluster.enable: true — there must be peers to restore
# from), dashboard.clusterHistoryRestore is enabled (off by default — it
# can OOM pods under real cluster traffic; see config.dashboard below), and
# identities are stable (StatefulSet, the default — it pairs with cluster mode
# being on by default: stable pod DNS for gossip, ordered graceful scale-down
# so olric hands off partitions cleanly, and dashboard counters that survive a
# rolling restart). Override to `kind: Deployment` for a stateless rollout;
# counters then start cold after a restart, but cache and rate-limit are
# unaffected either way. Live metrics-history panels populate regardless.
kind: StatefulSet

# Default 1: a single-pod cluster works and performs identically to loopback.
# Cluster mode is ON by default, so scaling up is safe — every replica shares
# one olric-backed cache / rate-limit / JWT-replay store (no per-pod divergence,
# no rate-limit multiplication). For HA raise this to 3 — the textbook olric
# shape (RF=2, quorum=2 = no split-brain) — or enable autoscaling below. The
# chart ships no default affinity so single-node clusters (kind, k3s, minikube)
# just work; for production multi-node add a soft pod-anti-affinity via
# `affinity:` below or a topologySpreadConstraint.
replicaCount: 1

# Cosmoguard config rendered as a ConfigMap and mounted at /etc/cosmoguard.
# This is the SAME YAML you'd put in cosmoguard.yaml directly — see
# CONFIG.md for the full schema reference.
config:
  host: 0.0.0.0
  lcdPort: 11317
  rpcPort: 16657
  grpcPort: 19090
  # EVM RPC + WS — only exposed when enableEvm is true. The
  # deployment / service templates conditionally render the matching
  # container/service ports.
  enableEvm: false
  evmRpcPort: 18545
  evmRpcWsPort: 18546
  metrics:
    enable: true
    port: 9001
  # Read-only operator dashboard. Off by default in the chart so the
  # dashboard isn't unintentionally exposed via Service or NetworkPolicy
  # rules; enable explicitly when you want it.
  dashboard:
    enable: false
    port: 19999
    # Live-traffic panel: time-windowed log of recent request
    # metadata (no headers, no bodies). Off by default — turning it
    # on surfaces every captured request's path, identity, and
    # source IP on the dashboard, so restrict access (BasicAuth or
    # IP allowlist) before flipping it on.
    #
    # Hot-reloadable: edits to this block take effect on the next
    # request without a pod restart.
    # requestLog:
    #   enable: true
    #   maxAge: 30m        # entries older than now-maxAge get evicted
    #   maxEntries: 10000  # global hard cap (OOM backstop)
    #   includeSuccess: true
    #   includeDenied: true
    #
    # Cross-pod restart-restore of dashboard counters + metrics history.
    # OFF by default and deliberately so: enabling it makes each pod
    # rewrite a large observability blob to a replicated olric DMap (RF =
    # cache.cluster.replicaCount, default 2) every 30s, and olric's log-
    # structured store grows unbounded from that under real cluster
    # traffic → the pod is OOMKilled. Requires cluster mode
    # (config.cache.cluster.enable: true) — it is ignored otherwise, since
    # there are no peers to restore from. Live dashboard, metrics-history
    # panels, cluster fan-out, and /metrics all work with it off; only
    # survival of history across a rolling restart is gated. See CONFIG.md.
    # clusterHistoryRestore: false
  server:
    readHeaderTimeout: 10s
    readTimeout: 30s
    # writeTimeout defaults to 0s (no limit) so large/slow streamed responses
    # (/block_results, /genesis, big eth_getLogs) aren't truncated mid-body.
    # Set an explicit ceiling if exposing cosmoguard to untrusted clients.
    # Must be a duration string ("0s", "30s") — a bare 0 fails to unmarshal
    # into the server's time.Duration field.
    writeTimeout: "0s"
    idleTimeout: 60s
    # 5 MiB accommodates large payloads (e.g. a wasm MsgStoreCode broadcast).
    # 0 means no limit.
    maxRequestBody: 5242880
    # wsReadLimit defaults to 1 MiB (0 = no limit).
    wsReadLimit: 1048576
  # Replace with your real Cosmos node(s). Multi-node + healthcheck
  # support enables horizontal HA at the cosmoguard layer.
  nodes:
    - name: node-0
      host: cosmos-node
      lcdPort: 1317
      rpcPort: 26657
      grpcPort: 9090
      healthcheck:
        enable: true
        path: /status
        service: rpc
        interval: 5s
        timeout: 2s
        unhealthyAfter: 3
        healthyAfter: 2
  # Cache + cluster wiring. With cluster.enable: true the chart:
  #   - injects POD_IP via the downward API (used as bindAddr; wildcard
  #     addresses would collide on memberlist Name across pods);
  #   - opens bindPort + gossipPort (TCP + UDP) + peerApiPort on the
  #     workload and the rendered headless peer Service;
  #   - auto-fills discovery.dns.host to that headless service's FQDN.
  # Set cluster.enable: false to run olric in embedded loopback mode
  # (no gossip, no peer service); useful for permanent single-pod installs.
  cache:
    # ttl: 5s
    cluster:
      # Default ON: cosmoguard runs as a networked olric cluster. The chart
      # auto-wires everything a standard Kubernetes install needs — ${POD_IP}
      # bind addr, DNS discovery via the headless peer Service, and a
      # generated+persisted gossip key (cluster.generateEncryptionKey, below).
      # A single replica works and performs identically to embedded loopback,
      # so this is safe even for one-pod installs; scale up (or enable HPA) and
      # every replica shares one olric store. Set enable: false for embedded
      # loopback mode (no gossip, no peer Service, no key). GitOps note:
      # client-side rendering can't look up the generated key — set
      # cluster.existingEncryptionKeySecret there.
      enable: true
      # bindAddr defaults to "${POD_IP}" via the chart's downward-API
      # wire-up. Override only on bare metal / non-K8s installs.
      # bindAddr: "${POD_IP}"
      bindPort: 3320          # olric RESP (TCP)
      gossipPort: 3322        # memberlist (TCP + UDP on same port!)
      peerApiPort: 0          # 0 → bindPort + 1; dashboard fan-out HTTP
      replicaCount: 2         # olric replication factor (RF=2 is the
                              # default; 3 is the textbook split-brain-
                              # proof choice for production HA).
      quorum: 1               # set to 2 when replicaCount: 3
      discovery:
        # "dns" works zero-config with the chart's headless peer
        # service. "static" wants an explicit peer list (useful on VMs).
        # "kubernetes" + "mdns" are experimental in v4.
        mode: dns
        dns:
          # Empty → auto-filled to the headless peer service's in-cluster
          # FQDN (<release>-cosmoguard-peers.<namespace>.svc.cluster.local).
          host: ""
          refreshInterval: 10s
  lcd:
    default: allow
  rpc:
    default: allow
    jsonrpc:
      default: allow
  grpc:
    default: deny

# Use an existing ConfigMap instead of templating one from `config:` above.
# Useful when you manage cosmoguard.yaml outside Helm (e.g. ArgoCD).
existingConfigMap: ""

# Use an existing Secret as the source of env vars for the container —
# the standard pattern for ${VAR} interpolated secrets in `config:`.
# The Secret must define the env var names cosmoguard.yaml references.
existingSecret: ""

# Inline env vars added to the container. Combine with existingSecret
# above when you have a mix of plaintext and secret env vars.
env: {}
  # JWT_SECRET: "..."   # don't put real secrets here; use existingSecret

# Cluster gossip/data encryption key wiring. Cluster mode
# (config.cache.cluster.enable: true — the default) needs a shared key across
# every replica. By DEFAULT the chart generates one and persists it
# (cluster.generateEncryptionKey below, minted once and reused via lookup,
# resource-policy: keep). CAVEAT: client-side / GitOps rendering (helm template,
# Argo CD without cluster access) can't look up the existing Secret and would
# mint a different key each sync, partitioning the cluster — there, supply one
# of the two below instead (every replica must share the same value):
cluster:
  # RECOMMENDED: reference a pre-created Secret with a base64-encoded
  # `encryptionKey` data field (16/24/32 bytes). Create it once with e.g.:
  #   kubectl create secret generic cosmoguard-cluster \
  #     --from-literal=encryptionKey=$(head -c32 /dev/urandom | base64)
  existingEncryptionKeySecret: ""
  # Alternatively provide the key inline (base64-encoded 16/24/32 bytes). NOT
  # recommended — it lands in the rendered ConfigMap in cleartext.
  encryptionKey: ""
  # When neither encryptionKey nor existingEncryptionKeySecret is set and
  # cluster mode is on, the chart generates a random 32-byte key into a
  # Secret named `<fullname>-cluster-key` and wires every pod to it. The key
  # is generated ONCE and reused across upgrades via a cluster `lookup`, and
  # the Secret is annotated `helm.sh/resource-policy: keep` so it survives a
  # `helm uninstall` — a fresh key would partition a running cluster.
  #
  # CAVEAT (GitOps): `helm template` / client-side rendering cannot `lookup`
  # the existing Secret, so it re-generates on every render and would churn
  # the key across syncs. If you render client-side (Argo CD/Flux `helm
  # template` mode), set generateEncryptionKey: false and supply
  # existingEncryptionKeySecret instead.
  generateEncryptionKey: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  annotations: {}
  # Ports here mirror the listening ports in `config:` above.
  lcdPort: 11317
  rpcPort: 16657
  grpcPort: 19090
  metricsPort: 9001
  dashboardPort: 19999

# Headless peer Service (clusterIP: None) for memberlist gossip + DNS-based
# peer discovery. Only rendered when config.cluster.enable is true, since
# embedded-mode olric has no inter-pod traffic. Carries:
#   - gossip (TCP + UDP on the SAME port — operators often block UDP by
#     reflex, which silently breaks cluster formation; the chart documents
#     both protocols on this port);
#   - olric RESP bindPort (TCP, node-to-node data replication);
#   - peerApiPort (TCP, dashboard fan-out aggregator — restricted to the
#     member set at the network layer, never internet-facing).
#
# Headless is required: memberlist needs every pod's real IP, not a VIP.
# The DNS discovery mode resolves this service's name to the per-pod
# A records the headless mode produces, which is exactly what olric joins.
peerService:
  # The peer service is named "<fullName>-peers" by default. Override
  # here when you need a specific name (e.g. for an existing NetworkPolicy
  # selector). Empty → auto-named.
  nameOverride: ""
  annotations: {}

# ---------------------------------------------------------------------------
# External exposure
# ---------------------------------------------------------------------------
# Two routing modes are supported and are mutually exclusive:
#   - Ingress (networking.k8s.io/v1)        — set ingress.enabled (and
#     optionally ingressGrpc.enabled, ingressDashboard.enabled)
#   - Gateway API (gateway.networking.k8s.io/v1) — set gateway.enabled
#
# Each protocol gets its own object because (a) gRPC needs a different
# backend protocol than LCD/RPC, and (b) the dashboard reveals operator-
# only data (deny patterns, unmatched paths, rule fingerprints) and
# should never share a host or auth posture with the public proxy.
#
# Disable an endpoint by leaving its `hosts` (Ingress) or `hostnames`
# (Gateway API) empty — no manifest is rendered for that endpoint.

# Ingress for LCD / RPC / EVM. Per-endpoint hostnames so each protocol
# can live on its own subdomain. WebSocket upgrades on /websocket and
# the EVM WS port pass through transparently on all conformant
# controllers (nginx, traefik, contour, etc.).
ingress:
  enabled: false
  className: ""
  # Annotations applied to THIS Ingress only. Common picks:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"  # for WS
  annotations: {}
  # TLS shared by the LCD/RPC/EVM hosts. One entry per cert.
  #   - hosts: ["lcd.example.com", "rpc.example.com"]
  #     secretName: cosmoguard-tls
  tls: []
  lcd:
    hosts: []    # ["lcd.example.com"]
    path: /
    pathType: Prefix
  rpc:
    hosts: []    # ["rpc.example.com"]
    path: /
    pathType: Prefix
  evmRpc:
    hosts: []    # ["evm.example.com"]
    path: /
    pathType: Prefix
  evmRpcWs:
    hosts: []    # ["evm-ws.example.com"]
    path: /
    pathType: Prefix

# Separate Ingress for gRPC. nginx-ingress (and most others) can't mix
# gRPC and HTTP/1.1 on the same Ingress object — the backend-protocol
# annotation is per-Ingress. Off by default; opt in when you actually
# expose the gRPC port.
ingressGrpc:
  enabled: false
  className: ""
  # Default sets nginx-ingress backend protocol. Override for other
  # controllers (Traefik: use `traefik.ingress.kubernetes.io/service.serversscheme: h2c`).
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: GRPC
  hosts: []      # ["grpc.example.com"]
  path: /
  pathType: Prefix
  tls: []

# Separate Ingress for the dashboard. Off even when ingress.enabled is
# true — the dashboard has no built-in auth and reveals operator data.
# Refuses to render when config.dashboard.enable is false.
#
# Recommended annotations (pick what fits your controller):
#   nginx.ingress.kubernetes.io/auth-type: basic
#   nginx.ingress.kubernetes.io/auth-secret: cosmoguard-dashboard-htpasswd
#   nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
ingressDashboard:
  enabled: false
  className: ""
  annotations: {}
  hosts: []      # ["cosmoguard.internal.example.com"]
  path: /
  pathType: Prefix
  tls: []

# Gateway API alternative. Mutually exclusive with the three ingress*
# blocks above. Each route attaches to operator-supplied parentRefs;
# parentRefs at the top level apply to every route unless an endpoint
# sets its own.
#
# Tested against Istio, Envoy Gateway, and Cilium Gateway. GRPCRoute is
# required for the grpc endpoint (no conformant implementation models
# gRPC via HTTPRoute alone).
gateway:
  enabled: false
  # Default parentRefs for every endpoint. Override per-endpoint when
  # you need different Gateways (e.g. public LCD vs internal dashboard).
  parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-system
    #   sectionName: https
  lcd:
    hostnames: []  # ["lcd.example.com"]
    parentRefs: []
  rpc:
    hostnames: []
    parentRefs: []
  evmRpc:
    hostnames: []
    parentRefs: []
  evmRpcWs:
    hostnames: []
    parentRefs: []
  grpc:
    hostnames: []
    parentRefs: []
  dashboard:
    hostnames: []
    parentRefs: []

# PodDisruptionBudget — caps voluntary disruptions so the olric cluster
# keeps quorum during node drains and rolling node upgrades. Off by
# default for single-replica installs (a PDB with minAvailable: 1 on a
# 1-replica workload blocks drains entirely). For HA cluster mode
# (replicas >= 2 with config.cluster.enable: true) you almost certainly
# want this on with minAvailable: 1 (allows one pod down) or
# maxUnavailable: 1 — pick whichever expresses your tolerance.
podDisruptionBudget:
  enabled: false
  # Exactly one of minAvailable / maxUnavailable should be set. The chart
  # rejects setting both to avoid an ambiguous PDB. Integer or "50%".
  minAvailable: 1
  # maxUnavailable: 1

resources:
  limits:
    cpu: 1
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# NetworkPolicy for the cluster-mode peer surface. Restricts the
# peer-api port (dashboard fan-out aggregator) AND the gossip / RESP
# ports to the cosmoguard pods themselves — never the wider network.
# Without this, any pod in the namespace can hit peer-api (which reads
# operator-visible state) and any pod can talk to gossip (which can
# join the cluster as a phantom member if they speak the protocol).
#
# Off by default because not every cluster runs a CNI that enforces
# NetworkPolicy (kindnet doesn't; cilium, calico, weave do). Turn on
# explicitly when you're sure your CNI enforces.
networkPolicy:
  enabled: false
  # Extra ingress rules for the *proxy* listeners (LCD/RPC/gRPC/...).
  # By default the proxy listeners are NOT restricted by this policy
  # (we add nothing for them — they're the public ingress surface and
  # the controller / mesh handles auth/IP-allowlist). Add rules here
  # to lock them down to specific namespaces / pod selectors.
  proxyIngress: []
    # - from:
    #     - namespaceSelector:
    #         matchLabels:
    #           kubernetes.io/metadata.name: trusted-clients

# Horizontal Pod Autoscaler — bound on top of the Redis-shared rate
# limiter state from Phase D so replicas don't multiply rate-limit
# budgets. Safe to enable when `config.cache.cluster.enable: true` (the
# default) — every replica shares the same olric-backed bucket pool,
# so a configured `10 req/s per IP` rule stays at 10 req/s regardless
# of replica count. Without cluster mode, each replica has its own
# bucket and HPA multiplies the budget by replicaCount.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80
  # behavior is passed straight through to the HPA spec. It only takes effect
  # when autoscaling.enabled is true (the HPA object isn't rendered otherwise),
  # so it ships as a real default: enabling HPA then gets an olric-safe
  # conservative scaleDown out of the box instead of Kubernetes' aggressive
  # default (which can remove every excess pod at once after the stabilization
  # window — forcing olric to rebalance many partitions simultaneously). One
  # pod every 2 minutes lets partitions hand off gracefully between removals.
  # Override for a faster fleet, or set behavior: {} for the Kubernetes defaults.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

# ServiceMonitor for the Prometheus operator. Disabled by default;
# enable when prometheus-operator is installed in the cluster.
#
# NOTE on labels: most kube-prometheus-stack installations restrict
# which ServiceMonitors get scraped via a `release: <prometheus-release>`
# label selector on the Prometheus CR (`serviceMonitorSelector`). If you
# enable this ServiceMonitor and don't see scrapes, set `labels.release`
# here to match — typically `release: prometheus` for the standard
# kube-prometheus-stack release name. Leave empty to fall back to the
# default app.kubernetes.io/* labels.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
    # release: prometheus

nodeSelector: {}
tolerations: []

# Affinity. Empty by default so the chart installs on single-node
# clusters without scheduling failures. For production multi-node
# deploys, a soft pod-anti-affinity is the right shape — it spreads
# replicas across nodes when possible but doesn't block scheduling
# when node count < replicaCount. Example:
#
#   affinity:
#     podAntiAffinity:
#       preferredDuringSchedulingIgnoredDuringExecution:
#         - weight: 100
#           podAffinityTerm:
#             topologyKey: kubernetes.io/hostname
#             labelSelector:
#               matchLabels:
#                 app.kubernetes.io/name: cosmoguard
affinity: {}

# Optional topology spread constraints. Apply across zone or node to
# survive zonal outages with `whenUnsatisfiable: ScheduleAnyway` (soft).
# Examples:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: cosmoguard
topologySpreadConstraints: []

# Lifecycle probes hit cosmoguard's built-in /healthz and /readyz on
# the metrics port. /readyz reflects upstream-pool health so a node
# without a healthy upstream stops receiving traffic.
livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
