{{- if eq (include "cosmoguard.shouldGenerateKey" .) "true" -}}
{{- /*
Self-managed cluster encryption key. Generated once with crypto/rand
(randBytes → base64 of 32 bytes = AES-256) and reused on every subsequent
upgrade via a cluster lookup, so the shared memberlist/olric key stays
stable. resource-policy: keep prevents `helm uninstall` from deleting it —
re-minting a key would partition an already-running cluster.

The stored data value is the double-encoded form: cosmoguard reads the env
var as a base64 string and decodes it to the 32 raw key bytes, and the
Secret `data` field is itself base64 (Kubernetes decodes it before
injection), so `data.encryptionKey` = base64(base64(32 random bytes)).
*/ -}}
{{- $name := include "cosmoguard.generatedKeySecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $data := "" -}}
{{- if and $existing (hasKey ($existing.data | default dict) "encryptionKey") -}}
{{- $data = index $existing.data "encryptionKey" -}}
{{- else -}}
{{- $data = randBytes 32 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cosmoguard.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  encryptionKey: {{ $data }}
{{- end -}}
