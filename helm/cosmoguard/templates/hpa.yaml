{{- if .Values.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cosmoguard.fullname" . }}
  labels: {{- include "cosmoguard.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    # Tracks the workload kind so HPA points at the StatefulSet when
    # the operator picks one (typical for cluster mode where stable
    # hostnames matter for observability survival).
    kind: {{ default "Deployment" .Values.kind }}
    name: {{ include "cosmoguard.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  # Scale-down policy matters for cluster mode: removing several pods at
  # once forces olric to rebalance many partitions simultaneously. A
  # conservative scaleDown (stabilization window + one pod per period)
  # lets partitions hand off gracefully between removals.
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
