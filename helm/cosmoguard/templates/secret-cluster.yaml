{{/*
Cluster encryption key Secret. Rendered only in cluster mode, and only when
the operator hasn't supplied the key inline (config.cache.cluster.encryptionKey)
or pointed at an existing Secret (cluster.existingEncryptionKeySecret).

The key is generated on first install and PRESERVED across `helm upgrade` via
the lookup in cosmoguard.clusterEncryptionKey — rotating it would partition the
running cluster. It is a base64-encoded 32-byte key, consumed by cosmoguard as
the CLUSTER_ENCRYPTION_KEY env var and interpolated into
cache.cluster.encryptionKey.
*/}}
{{- if eq (include "cosmoguard.clusterEnabled" .) "true" -}}
{{- $cluster := .Values.cluster | default (dict) -}}
{{- if and (not (include "cosmoguard.clusterInlineKey" .)) (not $cluster.existingEncryptionKeySecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cosmoguard.clusterSecretName" . }}
  labels: {{- include "cosmoguard.labels" . | nindent 4 }}
type: Opaque
data:
  encryptionKey: {{ include "cosmoguard.clusterEncryptionKey" . | b64enc | quote }}
{{- end -}}
{{- end -}}
