name: GoReleaser

on:
  push:
    tags:
      # Match v* but exclude chart-tag prefixes (chart/v*) which the
      # chart release workflow handles separately.
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match the toolchain go.mod requires; without this setup-go
          # picks a default (1.24) and GOTOOLCHAIN=local blocks the
          # auto-upgrade, so goreleaser fails "go.mod requires go >= 1.25".
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}