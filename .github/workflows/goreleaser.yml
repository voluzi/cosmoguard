name: GoReleaser

on:
  push:
    tags:
      # Match v* but exclude chart-tag prefixes (chart/v*) which the
      # chart release workflow handles separately.
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          # Match the toolchain go.mod requires; without this setup-go
          # picks a default (1.24) and GOTOOLCHAIN=local blocks the
          # auto-upgrade, so goreleaser fails "go.mod requires go >= 1.25".
          go-version-file: go.mod

      # For a STABLE release, base the changelog on the previous stable tag
      # (e.g. v4.0.0 → v3.0.0) instead of goreleaser's default of the
      # immediately-preceding tag, which would be the last -rc. Prerelease
      # tags (-rc/-beta/…) keep the default behaviour (diff against the prior
      # tag). GORELEASER_PREVIOUS_TAG overrides goreleaser's auto-detection.
      - name: Compute changelog base
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" != *-* ]]; then
            # Newest stable (no prerelease suffix) tag that isn't this one.
            prev=$(git tag --list 'v*' --sort=-v:refname \
              | awk -v cur="$tag" '$0 !~ /-/ && $0 != cur {print; exit}')
            if [ -n "$prev" ]; then
              echo "GORELEASER_PREVIOUS_TAG=$prev" >> "$GITHUB_ENV"
              echo "Stable release $tag: changelog base $prev..$tag"
            else
              echo "Stable release $tag: no prior stable tag; using goreleaser default"
            fi
          else
            echo "Prerelease $tag: using goreleaser default changelog base"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}